version: "3.9"

# ── Clinical Decision Support System ─────────────────────────────────────────
# FIX: MLflow now uses ./mlruns as a BIND MOUNT (same folder training writes to)
# so local runs and Docker UI both see the same experiments.
#
# Usage:
#   python code/train.py           # train locally first
#   docker compose up --build      # then start services
#   docker compose up -d           # or detached

networks:
  cdss_net:
    driver: bridge

volumes:
  model_data:

services:

  # ── MLflow — binds to local ./mlruns folder ────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: cdss_mlflow
    networks: [cdss_net]
    ports:
      - "5001:5000"
    volumes:
      # BIND MOUNT: same folder that train.py writes to locally
      - ./mlruns:/mlruns
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri file:///mlruns
        --default-artifact-root file:///mlruns/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cdss_backend
    networks: [cdss_net]
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models      # bind mount so locally-trained models are visible
      - ./data:/app/data:ro
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns      # backend can also log to same mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: cdss_frontend
    networks: [cdss_net]
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped